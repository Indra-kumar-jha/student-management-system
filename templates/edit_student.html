
{% extends 'layout.html' %}
{% block title %}Edit Student{% endblock %}

{% block content %}
<style>
    .form-container {
        max-width: 600px;
        margin: 40px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    }

    .form-container h2 {
        text-align: center;
        color: #333;
        margin-bottom: 25px;
    }

    form label {
        display: block;
        margin-top: 15px;
        font-weight: 600;
        color: #444;
    }

    form input,
    form textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 15px;
        box-sizing: border-box;
    }

    form button {
        display: block;
        width: 100%;
        margin-top: 25px;
        padding: 12px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
    }

    form button:hover {
        background-color: #0056b3;
    }
</style>

<div class="form-container">
    <h2>✏️ Edit Student Information</h2>
    <form method="POST" action="{{ url_for('update_student', student_id=student.id) }}">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" value="{{ student.name }}" required>

        <label for="roll">Roll Number</label>
        <input type="text" id="roll" name="roll" value="{{ student.roll }}" required>

        <label for="class">Class</label>
        <input type="text" id="class" name="class" value="{{ student.class }}" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ student.email }}" required>

        <label for="phone">Phone</label>
        <input type="text" id="phone" name="phone" value="{{ student.phone }}" required>

        <label for="address">Address</label>
        <textarea id="address" name="address" rows="3" required>{{ student.address }}</textarea>

        <button type="submit">Update Student</button>
    </form>
</div>
{% endblock %}
